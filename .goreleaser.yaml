project_name: ApitoBolt

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: lib
    main: ./
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: sdk
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:|^doc:"
      - "^test:|^tests:"

release:
  draft: true
  prerelease: auto
